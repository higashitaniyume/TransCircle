
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransCircleProject</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-pink: #ffccd5;
            --bg-pink: #fff0f3;
            --text-color: #5d4037;
            --accent-pink: #f06292;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            background-color: white;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            border: 4px solid var(--soft-pink);
            margin: 20px;
        }

        h1 {
            color: var(--primary-pink);
            text-align: center;
            font-size: 2.2em;
            margin-bottom: 30px;
            border-bottom: 2px dashed var(--soft-pink);
            padding-bottom: 15px;
        }

        h2 {
            color: var(--accent-pink);
            font-size: 1.4em;
            margin-top: 25px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '🌸';
            margin-right: 10px;
            font-size: 0.8em;
        }

        p {
            margin: 15px 0;
        }

        blockquote {
            background-color: var(--bg-pink);
            border-left: 5px solid var(--primary-pink);
            margin: 20px 0;
            padding: 15px 20px;
            font-style: italic;
            border-radius: 0 15px 15px 0;
            color: var(--accent-pink);
            font-weight: bold;
        }

        a {
            color: var(--accent-pink);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        a:hover {
            color: var(--primary-pink);
            text-decoration: underline;
        }

        .join-btn {
            display: inline-block;
            background-color: var(--primary-pink);
            color: white !important;
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 10px;
            text-decoration: none !important;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
        }

        .join-btn:hover {
            background-color: var(--accent-pink);
            transform: translateY(-2px);
        }

        .footer-license {
            margin-top: 40px;
            font-size: 0.85em;
            color: #9e9e9e;
            border-top: 1px solid var(--soft-pink);
            padding-top: 20px;
        }

        .decor {
            text-align: center;
            font-size: 1.5em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TransCircleProject</h1>
        
        <p>您好！我们正在进行 TransCircleProject 的初期准备。</p>

        <h2>这个计划是什么？</h2>
        <p>简单来说，就是一个统计中文女性倾向跨性别者的项目。我们计划制作一个列表和拼图来展现我们的团结。</p>

        <blockquote>
            “我们的存在，就是对恶意最大的反抗。”
        </blockquote>

        <h2>加入此项目</h2>
        <p>
            <a href="https://x.com/i/chat/group_join/g2053071552552603876/fw9lZ8e4SH" class="join-btn">加入 X 群组</a>
        </p>

        <h2>GitHub 仓库</h2>
        <p>
            <a href="https://github.com/epheiamoe/TransCircle">github.com/epheiamoe/TransCircle</a>
        </p>

        <h2>联系</h2>
        <p>
            <a href="https://x.com/nyaepheia">Epheia</a>
        </p>

        <div class="footer-license">
            <h2>LICENSE</h2>
            <p>对于此页面的文字和素材：CC BY 4.0 or later</p>
            <p>对于其他人提供的材料，依照她们的版权要求。届时我们会提供单独的版权页面。</p>
        </div>
        
        <div class="decor">✨ 🐾 ✨</div>
    </div>
</body>
</html>
